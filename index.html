.notif-form-row {
  display: flex;
  gap: 8px;
}

.notif-form-row .btn {
  flex-shrink: 0;
}

/* Responsive */
@media (max-width: 480px) {
  .app-container {
    padding: 0 12px;
  }
  .app-header {
    margin: 0 -12px;
    padding: 20px 16px 16px;
  }
}

/* Scrollbar */
::-webkit-scrollbar {
  width: 4px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: var(--rule);
  border-radius: 4px;
}

/* HR notification tab */
.hr-notif-section {
  border-top: 1px solid var(--border);
  margin-top: 16px;
  padding-top: 16px;
}

.hr-notif-section h4 {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 12px;
}
</style>
</head>
<body>

<!-- Notification Banner (for visitor guide page) -->
<div class="notification-banner" id="notifBanner">
  <span id="notifBannerText"></span>
  <button class="dismiss" onclick="dismissBanner()">&times;</button>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- HR Password Modal -->
<div class="modal-backdrop" id="hrPasswordModal">
  <div class="modal">
    <h3>HR 管理验证</h3>
    <div class="form-group">
      <label>管理密码</label>
      <input type="password" id="hrPasswordInput" placeholder="请输入管理密码" onkeydown="if(event.key==='Enter')verifyHRPassword()">
    </div>
    <button class="btn btn-primary" onclick="verifyHRPassword()">验证</button>
    <button class="btn btn-secondary" style="width:100%;margin-top:8px" onclick="closeHRModal()">取消</button>
  </div>
</div>

<!-- HR Panel Overlay -->
<div class="hr-overlay" id="hrOverlay">
  <div class="hr-panel">
    <div class="hr-panel-header">
      <h2>HR 管理后台</h2>
      <button class="hr-close-btn" onclick="closeHRPanel()">&times;</button>
    </div>
    <div class="hr-tabs" id="hrTabs">
      <div class="hr-tab active" data-tab="visitors" onclick="switchHRTab('visitors')">来访者</div>
      <div class="hr-tab" data-tab="steps" onclick="switchHRTab('steps')">引导设置</div>
      <div class="hr-tab" data-tab="rooms" onclick="switchHRTab('rooms')">会议室</div>
      <div class="hr-tab" data-tab="settings" onclick="switchHRTab('settings')">设置</div>
    </div>

    <!-- Visitors Tab -->
    <div class="hr-tab-content active" id="tab-visitors">
      <div id="visitorStats" class="stats-bar">
        <div class="stat-item">
          <div class="number" id="statTotal">0</div>
          <div class="label">总来访者</div>
        </div>
        <div class="stat-item">
          <div class="number" id="statToday">0</div>
          <div class="label">今日来访</div>
        </div>
        <div class="stat-item">
          <div class="number" id="statAssigned">0</div>
          <div class="label">已分配</div>
        </div>
      </div>
      <div id="visitorList">
        <div class="loading-state"><div class="spinner dark"></div> 加载中...</div>
      </div>
      <div class="hr-notif-section">
        <h4>推送通知</h4>
        <div class="notif-form">
          <input type="text" id="notifTarget" placeholder="目标来访者姓名（留空则广播）">
          <textarea id="notifMessage" placeholder="通知内容"></textarea>
          <div class="notif-form-row">
            <button class="btn btn-primary btn-sm" style="flex:1" onclick="sendNotification()">发送通知</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Steps Tab -->
    <div class="hr-tab-content" id="tab-steps">
      <div id="stepsEditor">
        <div class="loading-state"><div class="spinner dark"></div> 加载中...</div>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-secondary btn-sm" onclick="addStepEditor()" style="flex:1">+ 添加步骤</button>
        <button class="btn btn-primary btn-sm" onclick="saveSteps()" style="flex:1">保存设置</button>
      </div>
    </div>

    <!-- Rooms Tab -->
    <div class="hr-tab-content" id="tab-rooms">
      <div id="roomsEditor">
        <div class="loading-state"><div class="spinner dark"></div> 加载中...</div>
      </div>
    </div>

    <!-- Settings Tab -->
    <div class="hr-tab-content" id="tab-settings">
      <div id="settingsForm">
        <div class="loading-state"><div class="spinner dark"></div> 加载中...</div>
      </div>
      <button class="btn btn-primary btn-sm" style="width:100%;margin-top:16px" onclick="saveSettings()">保存设置</button>
    </div>
  </div>
</div>

<!-- Main App Container -->
<div class="app-container">
  <div class="app-header">
    <h1 id="headerTitle">面试来访引导</h1>
    <div class="subtitle" id="headerSubtitle">请填写您的来访信息</div>
    <div class="sync-indicator">
      <span class="sync-dot" id="syncDot"></span>
      <span id="syncText">连接中...</span>
    </div>
  </div>

  <!-- View 1: Visitor Form -->
  <div class="view active" id="view-form">
    <div class="card">
      <div class="card-title">
        <span class="icon">&#9993;</span>
        来访登记
      </div>
      <form id="visitorForm" onsubmit="submitVisitorForm(event)">
        <div class="form-group">
          <label>姓名</label>
          <input type="text" id="vName" placeholder="请输入您的姓名" required>
        </div>
        <div class="form-group">
          <label>出行方式</label>
          <div class="segmented">
            <label>
              <input type="radio" name="travel" value="自驾" checked>
              <span>自驾</span>
            </label>
            <label>
              <input type="radio" name="travel" value="公共交通">
              <span>公共交通</span>
            </label>
          </div>
        </div>
        <div class="form-group" id="plateGroup">
          <label>车牌号</label>
          <input type="text" id="vPlate" placeholder="例如：京A12345">
          <div class="hint">自驾来访请填写车牌号，便于保安登记</div>
        </div>
        <div class="form-group">
          <label>面试时间</label>
          <input type="datetime-local" id="vTime" required>
        </div>
        <button type="submit" class="btn btn-primary" id="submitBtn">
          提交登记
        </button>
      </form>
    </div>
  </div>

  <!-- View 2: Visitor Guide -->
  <div class="view" id="view-guide">
    <div class="welcome-banner">
      <h2 id="welcomeName">欢迎您</h2>
      <p id="welcomeCompany"></p>
      <div class="gate-badge">
        <svg class="icon-gate" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span id="welcomeGate"></span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        <span class="icon">&#9202;</span>
        面试信息
      </div>
      <div class="info-row">
        <span class="info-label">面试时间</span>
        <span class="info-value" id="guideTime">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">出行方式</span>
        <span class="info-value" id="guideTravel">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">车牌号</span>
        <span class="info-value" id="guidePlate">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">会议室</span>
        <span class="info-value" id="guideRoom">待分配</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        <span class="icon">&#128506;</span>
        入园指引
      </div>
      <ul class="step-list" id="guideSteps">
        <li class="step-item">
          <div class="step-number">1</div>
          <div class="step-content">
            <h4>加载中...</h4>
            <p>正在获取引导信息</p>
          </div>
        </li>
      </ul>
    </div>

    <button class="back-btn" onclick="goBackToForm()">&#8592; 返回重新登记</button>
  </div>
</div>

<!-- HR FAB Button -->
<button class="hr-fab" id="hrFab" onclick="openHRModal()" title="HR管理入口">&#9881;</button>

<script>
(function() {
  'use strict';

  // ==================== Constants ====================
  var API_BASE = 'https://api.github.com/repos/asdfghjkl147258290/interview-guide';
  var CONFIG_ISSUE_NUMBER = 1;
  var POLL_INTERVAL = 5000;

  // ==================== State ====================
  // Token 由 HR 在设置中配置，存储在 localStorage
  var BUILTIN_TOKEN = '';

  var state = {
    token: BUILTIN_TOKEN,
    hrPassword: localStorage.getItem('hr_password') || '',
    isAuthenticated: localStorage.getItem('hr_auth') === 'true',
    config: null,
    configUpdatedAt: null,
    currentVisitor: JSON.parse(sessionStorage.getItem('currentVisitor') || 'null'),
    currentVisitorIssueNumber: null,
    notifications: [],
    lastNotifCheck: null,
    pollTimer: null
  };

  // ==================== Utility Functions ====================
  function $(id) { return document.getElementById(id); }

  function showToast(msg, type) {
    type = type || 'info';
    var container = $('toastContainer');
    var toast = document.createElement('div');
    toast.className = 'toast ' + type;
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(function() {
      toast.classList.add('out');
      setTimeout(function() { toast.remove(); }, 300);
    }, 3000);
  }

  function showBanner(text) {
    $('notifBannerText').textContent = text;
    $('notifBanner').classList.add('show');
    setTimeout(dismissBanner, 8000);
  }

  function dismissBanner() {
    $('notifBanner').classList.remove('show');
  }

  function formatDate(dateStr) {
    if (!dateStr) return '-';
    var d = new Date(dateStr);
    var y = d.getFullYear();
    var m = String(d.getMonth() + 1).padStart(2, '0');
    var day = String(d.getDate()).padStart(2, '0');
    var h = String(d.getHours()).padStart(2, '0');
    var min = String(d.getMinutes()).padStart(2, '0');
    return y + '-' + m + '-' + day + ' ' + h + ':' + min;
  }

  function formatDateTimeLocal(dateStr) {
    if (!dateStr) return '';
    var d = new Date(dateStr);
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0') + 'T' +
      String(d.getHours()).padStart(2, '0') + ':' +
      String(d.getMinutes()).padStart(2, '0');
  }

  function setSyncStatus(online) {
    var dot = $('syncDot');
    var text = $('syncText');
    if (online) {
      dot.classList.remove('offline');
      text.textContent = '已连接';
    } else {
      dot.classList.add('offline');
      text.textContent = '连接断开';
    }
  }

  function switchView(viewId) {
    var views = document.querySelectorAll('.view');
    for (var i = 0; i < views.length; i++) {
      views[i].classList.remove('active');
    }
    $(viewId).classList.add('active');

    if (viewId === 'view-form') {
      $('headerTitle').textContent = '面试来访引导';
      $('headerSubtitle').textContent = '请填写您的来访信息';
      stopPolling();
    } else if (viewId === 'view-guide') {
      $('headerTitle').textContent = '来访引导';
      $('headerSubtitle').textContent = '面试当日请参照以下指引';
    }
  }

  // ==================== GitHub API (using fetch) ====================
  var apiHeaders = {
    'Accept': 'application/vnd.github+json',
    'Authorization': 'token ' + state.token,
    'Content-Type': 'application/json'
  };

  function apiGet(path, callback) {
    fetch(API_BASE + path, { headers: apiHeaders })
      .then(function(r) {
        setSyncStatus(r.ok);
        if (!r.ok) throw new Error('API Error: ' + r.status);
        return r.json();
      })
      .then(function(data) { callback(null, data); })
      .catch(function(err) { callback(err, null); });
  }

  function apiPost(path, data, callback) {
    fetch(API_BASE + path, {
      method: 'POST',
      headers: apiHeaders,
      body: JSON.stringify(data)
    })
      .then(function(r) {
        if (!r.ok) throw new Error('POST Error: ' + r.status);
        return r.json();
      })
      .then(function(data) { callback(null, data); })
      .catch(function(err) { callback(err, null); });
  }

  function apiPatch(issueNumber, data, callback) {
    fetch(API_BASE + '/issues/' + issueNumber, {
      method: 'PATCH',
      headers: apiHeaders,
      body: JSON.stringify(data)
    })
      .then(function(r) {
        if (!r.ok) throw new Error('PATCH Error: ' + r.status);
        return r.json();
      })
      .then(function(data) { callback(null, data); })
      .catch(function(err) { callback(err, null); });
  }

  // ==================== Config ====================
  var defaultConfig = {
    company: "立讯精密工业(苏州)有限公司",
    defaultGate: "2号门",
    transitGate: "1号门",
    password: "123456",
    rooms: [
      "A栋3楼-301会议室",
      "B栋5楼-508会议室",
      "A栋1楼-前台大厅"
    ],
    steps: [
      { title: "到达二号门", desc: "请从二号门进入园区", photo: "" },
      { title: "寻找保安", desc: "找到保安后说明来访面试", photo: "" },
      { title: "路线图到会客室", desc: "参照路线图前往", photo: "" }
    ]
  };

  function initConfig(callback) {
    if (!state.token) {
      console.log('No token, skipping init config');
      if (callback) callback(null);
      return;
    }
    // PATCH Issue #1 with config
    var data = {
      title: '[config] 全局配置',
      body: JSON.stringify(defaultConfig),
      state: 'open'
    };
    apiPatch(CONFIG_ISSUE_NUMBER, data, function(err, result) {
      if (err) {
        console.error('Init config failed:', err);
        if (callback) callback(err);
      } else {
        console.log('Config initialized:', result);
        state.config = defaultConfig;
        state.configUpdatedAt = result.updated_at;
        if (callback) callback(null);
      }
    });
  }

  function loadConfig(callback) {
    apiGet('/issues/' + CONFIG_ISSUE_NUMBER, function(err, issue) {
      if (err) {
        console.error('Load config failed:', err);
        if (callback) callback(err);
        return;
      }
      try {
        var body = JSON.parse(issue.body);
        state.config = body;
        state.configUpdatedAt = issue.updated_at;
        if (callback) callback(null, body);
      } catch(e) {
        console.error('Parse config failed:', e);
        if (callback) callback(e);
      }
    });
  }

  function updateConfig(newConfig, callback) {
    var data = {
      body: JSON.stringify(newConfig)
    };
    apiPatch(CONFIG_ISSUE_NUMBER, data, function(err, result) {
      if (!err) {
        state.config = newConfig;
        state.configUpdatedAt = result.updated_at;
      }
      if (callback) callback(err, result);
    });
  }

  // ==================== Visitor Form ====================
  window.submitVisitorForm = function(e) {
    e.preventDefault();
    var name = $('vName').value.trim();
    var travel = document.querySelector('input[name="travel"]:checked').value;
    var plate = $('vPlate').value.trim();
    var time = $('vTime').value;

    if (!name) {
      showToast('请输入姓名', 'error');
      return;
    }
    if (!time) {
      showToast('请选择面试时间', 'error');
      return;
    }

    var visitorData = {
      name: name,
      travel: travel,
      plate: plate,
      time: time,
      room: ''
    };

    var timestamp = new Date().toISOString();
    var title = '[visitor] ' + name + ' - ' + timestamp;

    var submitBtn = $('submitBtn');
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span> 提交中...';

    apiPost('/issues', {
      title: title,
      body: JSON.stringify(visitorData),
      labels: ['visitor']
    }, function(err, issue) {
      submitBtn.disabled = false;
      submitBtn.textContent = '提交登记';

      if (err) {
        showToast('提交失败: ' + err.message, 'error');
        console.error(err);
        return;
      }

      visitorData.issueNumber = issue.number;
      visitorData.issueUpdatedAt = issue.updated_at;
      state.currentVisitor = visitorData;
      state.currentVisitorIssueNumber = issue.number;
      sessionStorage.setItem('currentVisitor', JSON.stringify(visitorData));

      showToast('登记成功！', 'success');
      loadGuideView();
    });
  };

  // Travel mode toggle plate field
  var travelRadios = document.querySelectorAll('input[name="travel"]');
  for (var i = 0; i < travelRadios.length; i++) {
    travelRadios[i].addEventListener('change', function() {
      var plateGroup = $('plateGroup');
      if (this.value === '自驾') {
        plateGroup.style.display = 'block';
      } else {
        plateGroup.style.display = 'none';
      }
    });
  }

  // ==================== Guide View ====================
  function loadGuideView() {
    if (!state.currentVisitor) return;
    switchView('view-guide');

    loadConfig(function(err, config) {
      if (err || !config) {
        showToast('加载配置失败，请刷新重试', 'error');
        return;
      }

      renderGuide(config);
      startPolling();
    });
  }

  function renderGuide(config) {
    var v = state.currentVisitor;

    $('welcomeName').textContent = '欢迎您，' + v.name;
    $('welcomeCompany').textContent = config.company;
    var gate = v.travel === '公共交通' ? (config.transitGate || config.defaultGate) : config.defaultGate;
    $('welcomeGate').textContent = '请从' + gate + '进入';

    $('guideTime').textContent = formatDate(v.time);
    $('guideTravel').textContent = v.travel;
    $('guidePlate').textContent = v.plate || '-';
    $('guideRoom').textContent = v.room || '待分配';

    var stepsHtml = '';
    var steps = config.steps || [];
    for (var i = 0; i < steps.length; i++) {
      var s = steps[i];
      var photoHtml = '';
      if (s.photo) {
        photoHtml = '<img src="' + s.photo + '" alt="' + s.title + '">';
      }
      stepsHtml += '<li class="step-item">' +
        '<div class="step-number">' + (i + 1) + '</div>' +
        '<div class="step-content">' +
        '<h4>' + s.title + '</h4>' +
        '<p>' + s.desc + '</p>' +
        photoHtml +
        '</div></li>';
    }

    if (!stepsHtml) {
      stepsHtml = '<li class="step-item"><div class="step-number">1</div>' +
        '<div class="step-content"><h4>暂无引导步骤</h4>' +
        '<p>请联系前台获取指引</p></div></li>';
    }

    $('guideSteps').innerHTML = stepsHtml;
  }

  window.goBackToForm = function() {
    stopPolling();
    sessionStorage.removeItem('currentVisitor');
    state.currentVisitor = null;
    state.currentVisitorIssueNumber = null;
    switchView('view-form');
  };

  // ==================== Polling ====================
  function startPolling() {
    stopPolling();
    state.pollTimer = setInterval(pollForUpdates, POLL_INTERVAL);
  }

  function stopPolling() {
    if (state.pollTimer) {
      clearInterval(state.pollTimer);
      state.pollTimer = null;
    }
  }

  function pollForUpdates() {
    if (!state.currentVisitor) return;

    // Check config update
    apiGet('/issues/' + CONFIG_ISSUE_NUMBER, function(err, issue) {
      if (!err && issue) {
        if (state.configUpdatedAt && issue.updated_at !== state.configUpdatedAt) {
          try {
            var newConfig = JSON.parse(issue.body);
            state.config = newConfig;
            state.configUpdatedAt = issue.updated_at;
            renderGuide(newConfig);
            showToast('引导信息已更新', 'info');
          } catch(e) {}
        }
      }
    });

    // Check visitor room update
    if (state.currentVisitorIssueNumber) {
      apiGet('/issues/' + state.currentVisitorIssueNumber, function(err, issue) {
        if (!err && issue) {
          try {
            var data = JSON.parse(issue.body);
            if (data.room && state.currentVisitor.room !== data.room) {
              state.currentVisitor.room = data.room;
              sessionStorage.setItem('currentVisitor', JSON.stringify(state.currentVisitor));
              $('guideRoom').textContent = data.room;
              showBanner('会议室已更新: ' + data.room);
              showToast('会议室已更新: ' + data.room, 'success');
            }
          } catch(e) {}
        }
      });
    }

    // Check notifications
    var visitorName = state.currentVisitor ? state.currentVisitor.name : '';
    apiGet('/issues?labels=notification&state=open&per_page=10&sort=created&direction=desc', function(err, issues) {
      if (err || !issues) return;
      for (var i = 0; i < issues.length; i++) {
        var issue = issues[i];
        if (state.lastNotifCheck && new Date(issue.created_at) <= new Date(state.lastNotifCheck)) {
          continue;
        }
        try {
          var body = JSON.parse(issue.body);
          if (!body.target || body.target === visitorName || body.target === '' || body.target === 'all') {
            showBanner(body.message);
            state.lastNotifCheck = issue.created_at;
          }
        } catch(e) {}
      }
    });
  }

  // ==================== HR Management ====================
  window.openHRModal = function() {
    if (state.isAuthenticated) {
      openHRPanel();
      return;
    }
    $('hrPasswordModal').classList.add('active');
    setTimeout(function() { $('hrPasswordInput').focus(); }, 100);
  };

  window.closeHRModal = function() {
    $('hrPasswordModal').classList.remove('active');
    $('hrPasswordInput').value = '';
  };

  window.verifyHRPassword = function() {
    var pwd = $('hrPasswordInput').value;
    
    // If no token, show token config modal first
    if (!state.token) {
      closeHRModal();
      var tk = prompt('首次使用需要配置 GitHub Token\n\n请输入你的 GitHub Personal Access Token:\n(用于读写 Issues 数据)');
      if (tk && tk.trim()) {
        state.token = tk.trim();
        localStorage.setItem('hr_token', tk.trim());
        apiHeaders.Authorization = 'token ' + state.token;
        showToast('Token 已保存，正在验证...', 'info');
        // Re-verify password with new token
        loadConfig(function(err, config) {
          if (err || !config) {
            showToast('Token 无效或配置加载失败，请检查', 'error');
            state.token = '';
            localStorage.removeItem('hr_token');
            return;
          }
          if (pwd === config.password) {
            state.isAuthenticated = true;
            state.hrPassword = pwd;
            localStorage.setItem('hr_auth', 'true');
            localStorage.setItem('hr_password', pwd);
            showToast('验证成功', 'success');
            openHRPanel();
          } else {
            showToast('密码错误', 'error');
          }
        });
      }
      return;
    }

    // Fetch config to get password
    loadConfig(function(err, config) {
      if (err || !config) {
        showToast('无法获取配置，请检查Token', 'error');
        closeHRModal();
        return;
      }
      if (pwd === config.password) {
        state.isAuthenticated = true;
        state.hrPassword = pwd;
        localStorage.setItem('hr_auth', 'true');
        localStorage.setItem('hr_password', pwd);
        closeHRModal();
        showToast('验证成功', 'success');
        openHRPanel();
      } else {
        showToast('密码错误', 'error');
      }
    });
  };

  function openHRPanel() {
    if (!state.token) {
      showToast('请先在设置中配置 Token', 'error');
      openSettingsDirectly();
      return;
    }
    $('hrOverlay').classList.add('active');
    document.body.style.overflow = 'hidden';
    loadHRData();
  }

  window.closeHRPanel = function() {
    $('hrOverlay').classList.remove('active');
    document.body.style.overflow = '';
  };

  function openSettingsDirectly() {
    $('hrOverlay').classList.add('active');
    document.body.style.overflow = 'hidden';
    switchHRTab('settings');
    loadHRData();
  }

  window.switchHRTab = function(tabName) {
    var tabs = document.querySelectorAll('.hr-tab');
    for (var i = 0; i < tabs.length; i++) {
      tabs[i].classList.toggle('active', tabs[i].getAttribute('data-tab') === tabName);
    }
    var contents = document.querySelectorAll('.hr-tab-content');
    for (var i = 0; i < contents.length; i++) {
      contents[i].classList.toggle('active', contents[i].id === 'tab-' + tabName);
    }
  };

  function loadHRData() {
    loadVisitors();
    loadStepsEditor();
    loadRoomsEditor();
    loadSettingsForm();
  }

  // --- Visitors Tab ---
  function loadVisitors() {
    apiGet('/issues?labels=visitor&state=open&per_page=100&sort=created&direction=desc', function(err, issues) {
      if (err) {
        $('visitorList').innerHTML = '<div class="empty-state"><p>加载失败: ' + err.message + '</p></div>';
        return;
      }

      var total = issues.length;
      var today = new Date().toISOString().slice(0, 10);
      var todayCount = 0;
      var assignedCount = 0;

      var html = '';
      for (var i = 0; i < issues.length; i++) {
        var issue = issues[i];
        try {
          var data = JSON.parse(issue.body);
          var created = issue.created_at.slice(0, 10);
          if (created === today) todayCount++;
          if (data.room) assignedCount++;

          var roomOptions = '<option value="">未分配</option>';
          if (state.config && state.config.rooms) {
            for (var j = 0; j < state.config.rooms.length; j++) {
              var room = state.config.rooms[j];
              var selected = data.room === room ? ' selected' : '';
              roomOptions += '<option value="' + room + '"' + selected + '>' + room + '</option>';
            }
          }

          html += '<div class="visitor-card">' +
            '<div class="name">' + data.name + '</div>' +
            '<div class="meta">' +
            '<span>&#128663; ' + (data.travel || '-') + '</span>' +
            (data.plate ? '<span>&#128663; ' + data.plate + '</span>' : '') +
            '<span>&#128197; ' + formatDate(data.time) + '</span>' +
            '<span>&#128205; ' + (data.room || '未分配') + '</span>' +
            '</div>' +
            '<div class="room-assign">' +
            '<select data-issue="' + issue.number + '" onchange="assignRoom(this)">' +
            roomOptions + '</select>' +
            '<button class="btn btn-danger btn-sm" onclick="removeVisitor(' + issue.number + ')">移除</button>' +
            '</div></div>';
        } catch(e) {
          console.error('Parse visitor error:', e);
        }
      }

      if (!html) {
        html = '<div class="empty-state"><div class="icon">&#128100;</div><p>暂无来访记录</p></div>';
      }

      $('visitorList').innerHTML = html;
      $('statTotal').textContent = total;
      $('statToday').textContent = todayCount;
      $('statAssigned').textContent = assignedCount;
    });
  }

  window.assignRoom = function(selectEl) {
    var issueNum = selectEl.getAttribute('data-issue');
    var room = selectEl.value;

    apiGet('/issues/' + issueNum, function(err, issue) {
      if (err) {
        showToast('获取失败', 'error');
        return;
      }
      try {
        var data = JSON.parse(issue.body);
        data.room = room;
        apiPatch(issueNum, { body: JSON.stringify(data) }, function(err) {
          if (err) {
            showToast('分配失败: ' + err.message, 'error');
          } else {
            showToast('会议室已更新', 'success');
          }
        });
      } catch(e) {
        showToast('数据解析失败', 'error');
      }
    });
  };

  window.removeVisitor = function(issueNum) {
    if (!confirm('确定要移除该来访者记录吗？')) return;
    apiPatch(issueNum, { state: 'closed' }, function(err) {
      if (err) {
        showToast('操作失败', 'error');
      } else {
        showToast('已移除', 'success');
        loadVisitors();
      }
    });
  };

  // --- Notification ---
  window.sendNotification = function() {
    var target = $('notifTarget').value.trim();
    var message = $('notifMessage').value.trim();
    if (!message) {
      showToast('请输入通知内容', 'error');
      return;
    }

    var data = {
      target: target,
      message: message
    };

    var timestamp = new Date().toISOString();
    var title = '[通知] ' + (target || '全体') + ' - ' + timestamp;

    apiPost('/issues', {
      title: title,
      body: JSON.stringify(data),
      labels: ['notification']
    }, function(err, issue) {
      if (err) {
        showToast('发送失败: ' + err.message, 'error');
      } else {
        showToast('通知已发送', 'success');
        $('notifTarget').value = '';
        $('notifMessage').value = '';
      }
    });
  };

  // --- Steps Tab ---
  // Store photo data per step (base64)
  var stepPhotos = {};

  function compressImage(file, maxWidth, quality, callback) {
    maxWidth = maxWidth || 800;
    quality = quality || 0.7;
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement('canvas');
        var w = img.width;
        var h = img.height;
        if (w > maxWidth) {
          h = h * maxWidth / w;
          w = maxWidth;
        }
        canvas.width = w;
        canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        var dataUrl = canvas.toDataURL('image/jpeg', quality);
        // Estimate compressed size
        var sizeKB = Math.round(dataUrl.length * 3 / 4 / 1024);
        callback(null, dataUrl, sizeKB);
      };
      img.onerror = function() { callback(new Error('图片加载失败')); };
      img.src = e.target.result;
    };
    reader.onerror = function() { callback(new Error('文件读取失败')); };
    reader.readAsDataURL(file);
  }

  function renderPhotoUpload(index, photoUrl) {
    var hasPhoto = photoUrl && photoUrl.length > 0;
    var html = '<div class="step-photo-upload" onclick="triggerStepPhoto(' + index + ')">';
    if (hasPhoto) {
      html += '<img src="' + photoUrl + '" alt="步骤图片">';
      html += '<div class="photo-overlay">';
      html += '<span class="photo-size">已上传</span>';
      html += '<button onclick="event.stopPropagation(); removeStepPhoto(' + index + ')">删除</button>';
      html += '</div>';
    } else {
      html += '<div class="upload-placeholder">';
      html += '<span class="upload-icon">📷</span>';
      html += '<span>点击上传引导图片（自动压缩）</span>';
      html += '</div>';
    }
    html += '<input type="file" accept="image/*" onchange="handleStepPhoto(event, ' + index + ')">';
    html += '</div>';
    return html;
  }

  window.triggerStepPhoto = function(index) {
    var uploadDiv = document.querySelector('.step-editor-item[data-index="' + index + '"] .step-photo-upload');
    if (uploadDiv) uploadDiv.querySelector('input[type="file"]').click();
  };

  window.handleStepPhoto = function(event, index) {
    var file = event.target.files[0];
    if (!file) return;
    showToast('正在压缩...', 'info');
    compressImage(file, 800, 0.7, function(err, dataUrl, sizeKB) {
      if (err) {
        showToast('图片处理失败: ' + err.message, 'error');
        return;
      }
      stepPhotos[index] = dataUrl;
      showToast('图片已压缩 (' + sizeKB + 'KB)', 'success');
      loadStepsEditor();
    });
  };

  window.removeStepPhoto = function(index) {
    delete stepPhotos[index];
    loadStepsEditor();
  };

  function loadStepsEditor() {
    loadConfig(function(err, config) {
      if (err || !config) {
        $('stepsEditor').innerHTML = '<div class="empty-state"><p>加载失败</p></div>';
        return;
      }

      var steps = config.steps || [];
      var html = '';

      for (var i = 0; i < steps.length; i++) {
        var s = steps[i];
        var photo = stepPhotos[i] !== undefined ? stepPhotos[i] : (s.photo || '');
        html += '<div class="step-editor-item" data-index="' + i + '">' +
          '<div class="step-num">' + (i + 1) + '</div>' +
          '<button class="remove-step" onclick="removeStep(' + i + ')">&times;</button>' +
          '<input type="text" value="' + escHtml(s.title) + '" data-field="title" placeholder="步骤标题">' +
          '<textarea data-field="desc" placeholder="步骤描述">' + escHtml(s.desc) + '</textarea>' +
          renderPhotoUpload(i, photo) +
          '</div>';
      }

      if (!html) {
        html = '<div class="empty-state"><p>暂无引导步骤，点击下方添加</p></div>';
      }

      $('stepsEditor').innerHTML = html;
    });
  }

  window.addStepEditor = function() {
    var container = $('stepsEditor');
    var count = container.querySelectorAll('.step-editor-item').length;
    var div = document.createElement('div');
    div.className = 'step-editor-item';
    div.setAttribute('data-index', count);
    div.innerHTML = '<div class="step-num">' + (count + 1) + '</div>' +
      '<button class="remove-step" onclick="removeStep(this.parentElement)">&times;</button>' +
      '<input type="text" value="" data-field="title" placeholder="步骤标题">' +
      '<textarea data-field="desc" placeholder="步骤描述"></textarea>' +
      renderPhotoUpload(count, '');
    container.appendChild(div);
    renumberSteps();
  };

  window.removeStep = function(indexOrEl) {
    if (typeof indexOrEl === 'number') {
      var items = $('stepsEditor').querySelectorAll('.step-editor-item');
      if (items[indexOrEl]) items[indexOrEl].remove();
    } else {
      indexOrEl.remove();
    }
    renumberSteps();
  };

  function renumberSteps() {
    var items = $('stepsEditor').querySelectorAll('.step-editor-item');
    for (var i = 0; i < items.length; i++) {
      items[i].querySelector('.step-num').textContent = i + 1;
      items[i].setAttribute('data-index', i);
    }
  }

  window.saveSteps = function() {
    var items = $('stepsEditor').querySelectorAll('.step-editor-item');
    var steps = [];
    var oldSteps = state.config.steps || [];
    for (var i = 0; i < items.length; i++) {
      var item = items[i];
      var title = item.querySelector('input[data-field="title"]').value.trim();
      var desc = item.querySelector('textarea[data-field="desc"]').value.trim();
      // Use new uploaded photo, or keep existing one from config
      var photo = stepPhotos[i] !== undefined ? stepPhotos[i] : (oldSteps[i] ? oldSteps[i].photo || '' : '');
      steps.push({ title: title, desc: desc, photo: photo });
    }

    var newConfig = Object.assign({}, state.config);
    newConfig.steps = steps;
    updateConfig(newConfig, function(err) {
      if (err) {
        showToast('保存失败: ' + err.message, 'error');
      } else {
        showToast('引导步骤已保存', 'success');
        loadStepsEditor();
      }
    });
  };

  // --- Rooms Tab ---
  function loadRoomsEditor() {
    loadConfig(function(err, config) {
      if (err || !config) {
        $('roomsEditor').innerHTML = '<div class="empty-state"><p>加载失败</p></div>';
        return;
      }

      var rooms = config.rooms || [];
      var html = '<div class="card-title" style="margin-bottom:12px"><span class="icon">&#127970;</span> 会议室列表</div>';

      if (rooms.length > 0) {
        html += '<div class="room-tags">';
        for (var i = 0; i < rooms.length; i++) {
          html += '<span class="room-tag">' + escHtml(rooms[i]) +
            '<span class="remove" onclick="removeRoom(' + i + ')">&times;</span></span>';
        }
        html += '</div>';
      }

      html += '<div class="add-room-row">' +
        '<input type="text" id="newRoomInput" placeholder="输入会议室名称">' +
        '<button class="btn btn-primary btn-sm" onclick="addRoom()">添加</button>' +
        '</div>';

      html += '<div style="margin-top:16px">' +
        '<button class="btn btn-primary btn-sm" style="width:100%" onclick="saveRooms()">保存会议室列表</button>' +
        '</div>';

      $('roomsEditor').innerHTML = html;
    });
  }

  // Keep rooms in temp state
  var tempRooms = [];

  // Override loadRoomsEditor to work with temp state
  function loadRoomsEditor() {
    loadConfig(function(err, config) {
      if (err || !config) {
        $('roomsEditor').innerHTML = '<div class="empty-state"><p>加载失败</p></div>';
        return;
      }

      tempRooms = (config.rooms || []).slice();

      var html = '<div class="card-title" style="margin-bottom:12px"><span class="icon">&#127970;</span> 会议室列表</div>';

      html += '<div class="room-tags" id="roomTagsContainer">';
      for (var i = 0; i < tempRooms.length; i++) {
        html += '<span class="room-tag">' + escHtml(tempRooms[i]) +
          '<span class="remove" onclick="removeRoom(' + i + ')">&times;</span></span>';
      }
      html += '</div>';

      html += '<div class="add-room-row">' +
        '<input type="text" id="newRoomInput" placeholder="输入会议室名称" onkeydown="if(event.key===\'Enter\')addRoom()">' +
        '<button class="btn btn-primary btn-sm" onclick="addRoom()">添加</button>' +
        '</div>';

      html += '<div style="margin-top:16px">' +
        '<button class="btn btn-primary btn-sm" style="width:100%" onclick="saveRooms()">保存会议室列表</button>' +
        '</div>';

      $('roomsEditor').innerHTML = html;
    });
  }

  window.addRoom = function() {
    var input = $('newRoomInput');
    var name = input.value.trim();
    if (!name) return;
    if (tempRooms.indexOf(name) >= 0) {
      showToast('会议室已存在', 'error');
      return;
    }
    tempRooms.push(name);
    input.value = '';
    renderRoomTags();
    showToast('已添加: ' + name, 'success');
  };

  window.removeRoom = function(index) {
    tempRooms.splice(index, 1);
    renderRoomTags();
  };

  function renderRoomTags() {
    var container = $('roomTagsContainer');
    if (!container) return;
    var html = '';
    for (var i = 0; i < tempRooms.length; i++) {
      html += '<span class="room-tag">' + escHtml(tempRooms[i]) +
        '<span class="remove" onclick="removeRoom(' + i + ')">&times;</span></span>';
    }
    if (!html) html = '<span style="color:var(--muted);font-size:13px">暂无会议室</span>';
    container.innerHTML = html;
  }

  window.saveRooms = function() {
    var newConfig = Object.assign({}, state.config);
    newConfig.rooms = tempRooms.slice();
    updateConfig(newConfig, function(err) {
      if (err) {
        showToast('保存失败: ' + err.message, 'error');
      } else {
        showToast('会议室列表已保存', 'success');
      }
    });
  };

  // --- Settings Tab ---
  function loadSettingsForm() {
    loadConfig(function(err, config) {
      if (err || !config) {
        $('settingsForm').innerHTML = '<div class="empty-state"><p>加载失败，请配置Token后重试</p></div>';
        // Show at least the token config
        $('settingsForm').innerHTML =
          '<div class="setting-row"><label>GitHub Token</label>' +
          '<input type="password" id="settingToken" value="' + escHtml(state.token) + '" placeholder="ghp_xxx"></div>' +
          '<div style="margin-top:16px">' +
          '<button class="btn btn-primary btn-sm" onclick="saveTokenOnly()" style="width:100%">保存Token</button>' +
          '</div>';
        return;
      }

      var html =
        '<div class="setting-row"><label>公司名称</label><input type="text" id="settingCompany" value="' + escHtml(config.company || '') + '"></div>' +
        '<div class="setting-row"><label>默认入口</label><input type="text" id="settingGate" value="' + escHtml(config.defaultGate || '') + '"></div>' +
        '<div class="setting-row"><label>公共交通入口</label><input type="text" id="settingTransitGate" value="' + escHtml(config.transitGate || '') + '"></div>' +
        '<div class="setting-row"><label>管理密码</label><input type="password" id="settingPassword" value="' + escHtml(config.password || '') + '"></div>' +
        '<div class="setting-row"><label>GitHub Token</label><input type="password" id="settingToken" value="' + escHtml(state.token) + '" placeholder="ghp_xxx"></div>' +
        '<div style="margin-top:8px"><div class="hint">Token用于写入数据到GitHub Issues，请妥善保管。<br>可在 GitHub Settings > Developer settings > Personal access tokens 创建。</div></div>';

      $('settingsForm').innerHTML = html;
    });
  }

  window.saveSettings = function() {
    var company = $('settingCompany') ? $('settingCompany').value.trim() : '';
    var gate = $('settingGate') ? $('settingGate').value.trim() : '';
    var transitGate = $('settingTransitGate') ? $('settingTransitGate').value.trim() : '';
    var password = $('settingPassword') ? $('settingPassword').value.trim() : '';
    var token = $('settingToken') ? $('settingToken').value.trim() : '';

    if (!token) {
      showToast('Token 不能为空', 'error');
      return;
    }

    state.token = token;
    localStorage.setItem('hr_token', token);

    var newConfig = Object.assign({}, state.config || {});
    newConfig.company = company;
    newConfig.defaultGate = gate;
    newConfig.transitGate = transitGate;
    newConfig.password = password;

    updateConfig(newConfig, function(err) {
      if (err) {
        showToast('保存失败: ' + err.message, 'error');
      } else {
        showToast('设置已保存', 'success');
      }
    });
  };

  window.saveTokenOnly = function() {
    var token = $('settingToken') ? $('settingToken').value.trim() : '';
    if (!token) {
      showToast('Token 不能为空', 'error');
      return;
    }
    state.token = token;
    localStorage.setItem('hr_token', token);
    showToast('Token 已保存', 'success');
    loadHRData();
  };

  // ==================== Helper ====================
  function escHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str || ''));
    return div.innerHTML;
  }

  // ==================== Init ====================
  function init() {
    // Restore token: use builtin token as default, allow override from localStorage
    state.token = localStorage.getItem('hr_token') || BUILTIN_TOKEN;

    // If token exists, try to init config and load it
    if (state.token) {
      initConfig(function(err) {
        if (err) {
          console.error('Init config error:', err);
        }
        loadConfig(function(err2, config) {
          if (!err2 && config) {
            state.config = config;
          }
        });
      });
    } else {
      // No token, just load config as public
      loadConfig(function(err, config) {
        if (!err && config) {
          state.config = config;
        }
      });
    }

    // Check if returning visitor
    if (state.currentVisitor) {
      loadGuideView();
    }

    // Set default date/time
    var now = new Date();
    var localISO = now.getFullYear() + '-' +
      String(now.getMonth() + 1).padStart(2, '0') + '-' +
      String(now.getDate()).padStart(2, '0') + 'T' +
      String(now.getHours()).padStart(2, '0') + ':' +
      String(now.getMinutes()).padStart(2, '0');
    $('vTime').value = localISO;

    // Trigger plate field visibility
    var checkedTravel = document.querySelector('input[name="travel"]:checked');
    if (checkedTravel && checkedTravel.value !== '自驾') {
      $('plateGroup').style.display = 'none';
    }
  }

  // Close HR panel on overlay click
  $('hrOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeHRPanel();
  });

  $('hrPasswordModal').addEventListener('click', function(e) {
    if (e.target === this) closeHRModal();
  });

  // Start
  init();

})();
</script>
</body>
